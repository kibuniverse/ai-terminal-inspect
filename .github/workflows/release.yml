name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      # 修复：正确的 Rust 安装 Action
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
      
      # Linux + macOS 打包
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../ai-terminal-inspect-${{ matrix.target }}.tar.gz ai-terminal-inspect
          cd ../../..
      
      # Windows 打包（使用系统自带命令，无需 7z）
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ai-terminal-inspect.exe -DestinationPath ../../../ai-terminal-inspect-${{ matrix.target }}.zip
          cd ../../..
      
      # 上传对应平台文件到 Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ai-terminal-inspect-${{ matrix.target }}.tar.gz
            ai-terminal-inspect-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}